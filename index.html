<!doctype html>
<html>
  <head>
    <meta http-equiv="refresh" content="0; url=https://www.rekkbox.com">
    <link rel="canonical" href="https://www.rekkbox.com">
    <style>
      :root {
        --section-gap: 196px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: #ffffff;
        font-family: "Segoe UI", sans-serif;
      }

      .landing {
        min-height: 100svh;
        padding: var(--section-gap) 20px 0;
      }

      .logo {
        width: min(100%, 260px);
        height: auto;
        display: block;
        margin: 0 auto;
      }

      .redirect-message {
        margin: 24px 0 0;
        text-align: center;
      }

      @media (max-width: 640px) {
        :root {
          --section-gap: 120px;
        }

        .landing {
          padding-left: 14px;
          padding-right: 14px;
        }

        .logo {
          width: min(100%, 220px);
        }
      }
    </style>
  </head>
  <body>
    <main class="landing">
      <img class="logo" src="rekkbox-logo.png" alt="REKKBOX GAMES logo">
      <p class="redirect-message">Redirecting to <a href="https://www.rekkbox.com">www.rekkbox.com</a></p>
    </main>
  </body>
</html>
